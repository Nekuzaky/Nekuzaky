<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="50%" style="stop-color:#3d0000"/>
      <stop offset="100%" style="stop-color:#8b0000"/>
    </linearGradient>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(-10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideUp {
        0% { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      .title {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 48px;
        font-weight: 700;
        fill: #ffffff;
        animation: fadeIn 1s ease forwards;
        letter-spacing: 2px;
      }
      .subtitle {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 15px;
        font-weight: 400;
        fill: #cccccc;
        animation: slideUp 1s ease 0.5s both;
        letter-spacing: 1px;
      }
      .line {
        stroke: #8b0000;
        stroke-width: 1.5;
        animation: pulse 3s ease-in-out infinite;
      }
    </style>
  </defs>
  <rect width="900" height="200" fill="url(#bg)" rx="8"/>
  <line class="line" x1="80" y1="155" x2="820" y2="155"/>
  <text class="title" x="450" y="100" text-anchor="middle">Nekuzaky</text>
  <text class="subtitle" x="450" y="135" text-anchor="middle">Open-source Developer — Unity / C# · JavaScript · Minecraft Mods</text>
</svg>
